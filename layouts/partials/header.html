<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="/" class="site-logo" aria-label="Ana Sayfa">
        <div class="site-logo__icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="8" fill="#c4a050" fill-opacity="0.15"/>
            <path d="M20 8L12 14V28L20 32L28 28V14L20 8Z" stroke="#c4a050" stroke-width="1.5" fill="none"/>
            <path d="M14 18H26M14 22H26" stroke="#c4a050" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="20" cy="14" r="2" fill="#c4a050"/>
          </svg>
        </div>
        <div class="site-logo__text">
          Av. <span>Tufan Malcı</span>
        </div>
      </a>

      <button class="menu-toggle" aria-label="Menüyü aç/kapat" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="main-nav">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>
            {{ .Name }}
          </a>
        {{ end }}
      </nav>
    </div>
  </div>
</header>
