{{ define "main" }}
<section class="contact-section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info">
        <h1>İletişim</h1>
        <p>Hukuki danışmanlık veya randevu talepleriniz için aşağıdaki bilgilerden bize ulaşabilirsiniz.</p>

        <div class="contact-item">
          <div class="contact-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <div>
            <div class="contact-item__label">Telefon</div>
            <div class="contact-item__value">
              <a href="tel:{{ .Site.Params.phone }}">{{ .Site.Params.phone }}</a>
            </div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <div class="contact-item__label">E-posta</div>
            <div class="contact-item__value">
              <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
            </div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <div class="contact-item__label">Adres</div>
            <div class="contact-item__value">{{ .Site.Params.address }}</div>
          </div>
        </div>
      </div>

      <div class="contact-form">
        <h2>Bize Yazın</h2>
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div class="form-group">
            <label for="name">Ad Soyad</label>
            <input type="text" id="name" name="name" required placeholder="Adınız Soyadınız">
          </div>
          <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" id="email" name="email" required placeholder="ornek@email.com">
          </div>
          <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="tel" id="phone" name="phone" placeholder="+90 (5XX) XXX XX XX">
          </div>
          <div class="form-group">
            <label for="subject">Konu</label>
            <select id="subject" name="subject">
              <option value="">Konu Seçin</option>
              <option value="danismanlik">Hukuki Danışmanlık</option>
              <option value="dava">Dava Takibi</option>
              <option value="randevu">Randevu Talebi</option>
              <option value="diger">Diğer</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Mesajınız</label>
            <textarea id="message" name="message" required placeholder="Mesajınızı buraya yazın..."></textarea>
          </div>
          <button type="submit" class="btn btn--primary" style="width: 100%; justify-content: center;">Gönder</button>
        </form>
      </div>
    </div>
  </div>
</section>
{{ end }}
